<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CAVAGNOLA MCT - FIX</title>

<style>
body {
  background:#222;
  color:#f5a623;
  font-family:Arial;
  padding:20px;
}

label, select, input {
  display:block;
  margin:10px 0;
}

input, select {
  padding:8px;
  width:100%;
  max-width:300px;
  background:#333;
  color:#f5a623;
  border:2px solid #f5a623;
  border-radius:6px;
}

button {
  margin-top:15px;
  padding:12px;
  background:#d97115;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

#output {
  margin-top:20px;
  white-space:pre-line;
  background:#333;
  padding:15px;
  border-radius:8px;
  border:1px solid #f5a623;
}
</style>
</head>

<body>

<h2>CAVAGNOLA MCT</h2>

<label>Classe</label>
<select id="classe">
  <option value="Classe1">Classe 1</option>
  <option value="Classe2">Classe 2</option>
  <option value="Classe3">Classe 3</option>
  <option value="Classe4">Classe 4</option>
  <option value="ClasseGTW">Classe GTW</option>
  <option value="ClasseRoRo">Classe RoRo</option>
</select>

<label>Tipo</label>
<select id="tipo">
  <option value="cntrCR">cntr CR</option>
  <option value="prezzo">Prezzo</option>
</select>

<label>Valore</label>
<input type="number" id="valore" />

<label>Ritardo (ore)</label>
<input type="number" id="ritardo" value="0" />

<button id="calcola">Calcola</button>

<div id="output"></div>

<script>
const dati = {
  Classe1:[
    {min:135,max:144,prezzo:3,cntrSC:32},
    {min:145,max:154,prezzo:7,cntrSC:32},
    {min:155,max:164,prezzo:11,cntrSC:32},
    {min:165,max:174,prezzo:20,cntrSC:32},
    {min:175,max:184,prezzo:23,cntrSC:32},
    {min:185,max:194,prezzo:27,cntrSC:32},
    {min:195,max:204,prezzo:35,cntrSC:32},
    {min:205,max:Infinity,prezzo:42,cntrSC:32}
  ]
};

document.getElementById("calcola").addEventListener("click", () => {

  const classe = document.getElementById("classe").value;
  const tipo = document.getElementById("tipo").value;
  let valore = Number(document.getElementById("valore").value);
  const ritardo = Number(document.getElementById("ritardo").value);
  const output = document.getElementById("output");

  if (isNaN(valore)) {
    output.textContent = "Valore non valido";
    return;
  }

  const intervalli = dati[classe];
  if (!intervalli) {
    output.textContent = "Classe non trovata";
    return;
  }

  // 🔥 RITARDO CORRETTO: riduce il valore
  const percentuale = ritardo > 0 ? ritardo * 10 : 0;
  if (tipo === "cntrCR" && ritardo > 0) {
    valore = Math.ceil(valore * (1 - percentuale / 100));
  }

  const risultato = intervalli.find(el =>
    valore >= el.min && valore <= el.max
  );

  if (!risultato) {
    output.textContent = "Fuori intervallo";
    return;
  }

  const ritardoMsg =
    ritardo > 0
      ? `Ritardo: ${ritardo}h (-${percentuale}%)`
      : "Nessun ritardo";

  if (tipo === "cntrCR") {

    output.textContent =
`Cavagnola: €${risultato.prezzo}
Valore modificato: ${valore}
Contenitori SC: ${risultato.cntrSC}
${ritardoMsg}`;

  } else {

    output.textContent =
`Cavagnola: €${risultato.prezzo}
Range CR: ${risultato.min}-${risultato.max}
${ritardoMsg}`;
  }

});
</script>

</body>
</html>
