<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CAVAGNOLA MCT - By AC</title>

<style>
body {
  background-color: #222;
  color: #f5a623;
  font-family: Arial, sans-serif;
  padding: 20px;
  margin: 0;
}
label, select, input {
  display: block;
  margin: 10px 0 5px;
}
input, select {
  padding: 8px;
  width: 100%;
  max-width: 300px;
  border: 2px solid #f5a623;
  border-radius: 5px;
  background: #333;
  color: #f5a623;
}
button {
  margin-top: 15px;
  background-color: #d97115;
  color: #fff;
  border: none;
  padding: 12px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  max-width: 300px;
}
button:hover {
  background-color: #f5a623;
  color: #222;
}
#output {
  margin-top: 20px;
  white-space: pre-line;
  font-size: 1.1em;
  background: #333;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #f5a623;
  max-width: 350px;
}
</style>
</head>

<body>

<h1>CAVAGNOLA MCT - By AC</h1>

<label>Classe:</label>
<select id="classe">
  <option value="Classe1">Classe 1</option>
  <option value="Classe2">Classe 2</option>
  <option value="Classe3">Classe 3</option>
  <option value="Classe4">Classe 4</option>
  <option value="ClasseGTW">Classe GTW</option>
  <option value="ClasseRoRo">Classe RoRo</option>
</select>

<label>Tipo:</label>
<select id="tipo">
  <option value="cntrCR">cntr CR</option>
  <option value="prezzo">Prezzo</option>
</select>

<label>Valore:</label>
<input type="number" id="valore" />

<label>Ore ritardo:</label>
<input type="number" id="ritardo" value="0" />

<button id="calcola">Calcola</button>

<div id="output"></div>

<script>
const dati = {
  Classe1: [
    { min: 135, max: 144, prezzo: 3, cntrSC: 32 },
    { min: 145, max: 154, prezzo: 7, cntrSC: 32 },
    { min: 155, max: 164, prezzo: 11, cntrSC: 32 },
    { min: 165, max: 174, prezzo: 20, cntrSC: 32 },
    { min: 175, max: 184, prezzo: 23, cntrSC: 32 },
    { min: 185, max: 194, prezzo: 27, cntrSC: 32 },
    { min: 195, max: 204, prezzo: 35, cntrSC: 32 },
    { min: 205, max: Infinity, prezzo: 42, cntrSC: 32 }
  ]
};

document.getElementById("calcola").addEventListener("click", () => {

  const classe = document.getElementById("classe").value;
  const tipo = document.getElementById("tipo").value;
  const valore = Number(document.getElementById("valore").value);
  const ritardo = Number(document.getElementById("ritardo").value);
  const output = document.getElementById("output");

  if (isNaN(valore)) {
    output.textContent = "Valore non valido";
    return;
  }

  const intervalli = dati[classe];
  if (!intervalli) {
    output.textContent = "Classe non trovata";
    return;
  }

  const risultato = intervalli.find(el => valore >= el.min && valore <= el.max);

  if (!risultato) {
    output.textContent = "Fuori intervallo";
    return;
  }

  const percentuale = ritardo > 0 ? ritardo * 10 : 0;

  const obiettivoRitardo = Math.ceil(
    risultato.min * (1 - percentuale / 100)
  );

  let msgRitardo =
    ritardo > 0
      ? `Ritardo: ${ritardo}h (-${percentuale}%) → Obiettivo: ${obiettivoRitardo}`
      : "Nessun ritardo";

  if (tipo === "cntrCR") {

    output.textContent =
`Cavagnola: €${risultato.prezzo}
Obiettivo SC: ${obiettivoRitardo}
Contenitori SC base: ${risultato.cntrSC}
${msgRitardo}`;

  } else {

    output.textContent =
`Cavagnola: €${risultato.prezzo}
Range CR: ${risultato.min}-${risultato.max}
${msgRitardo}`;
  }

});
</script>

</body>
</html>
